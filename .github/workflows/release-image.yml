name: Release Image

on:
  push:
    tags:
      - "v*"
  # Manual trigger so an updated image can be built/pushed on demand from
  # the Actions tab (the "Run workflow" button) without cutting a tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to publish alongside latest (manual runs only)"
        required: false
        default: "manual"

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bradbrownjr/mowc
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
