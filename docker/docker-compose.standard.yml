# Standard self-hosted deployment. Publishes only port 7120 and mounts only
# the data volume. Put a reverse proxy (TLS) in front for internet exposure.
services:
  mowc:
    image: ghcr.io/bradbrownjr/mowc:latest
    container_name: mowc
    restart: unless-stopped
    ports:
      - "7120:7120"
    environment:
      # These names must match the server's config reader exactly.
      MOWC_PORT: "7120"
      MOWC_DATA_DIR: /data
      # Email of the account that becomes the server owner: only this
      # account's content packs are shared with every user (docs/
      # SECURITY.md section 7). Register this account first, then set
      # this to match. Optional; omit to leave every pack private.
      # MOWC_ADMIN_EMAIL: keeper@example.com
      # Behind a reverse proxy (nginx/caddy/traefik), set to the number of
      # proxy hops (usually 1) so rate limiting sees real client IPs.
      # Leave unset when exposing the port directly (docs/SECURITY.md
      # section 8).
      # MOWC_TRUST_PROXY: "1"
      # Owner of files written to the data volume. Set to your host user.
      PUID: "1000"
      PGID: "1000"
    volumes:
      - ./data:/data
